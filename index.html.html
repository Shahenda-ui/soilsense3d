<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdina 3d — Zahour Al-Omara, Dalingat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<style>
:root {
  --bg:        #04080f;
  --panel:     #070d1a;
  --card:      #0c1425;
  --border:    #162040;
  --accent:    #00e5b0;
  --accent2:   #4f8eff;
  --accent3:   #ff6b35;
  --warn:      #f5a623;
  --danger:    #ff3d57;
  --text:      #dde8ff;
  --muted:     #4a6080;
  --green:     #22c55e;
  --gold:      #ffd166;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ─── 3D CANVAS BG ─── */
#three-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0.55;
}

/* ─── HEADER ─── */
header {
  background: rgba(42, 59, 88, 0.521);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 1000;
  backdrop-filter: blur(16px);
}
header::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
}
.logo { display:flex; align-items:center; gap:14px; }
.logo-icon {
  width:42px; height:42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  box-shadow: 0 0 20px rgba(0,229,176,0.3);
  position: relative;
  overflow: hidden;
}
.logo-icon::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
  animation: shimmer 3s infinite;
}
@keyframes shimmer { 0%{transform:translateX(-100%) translateY(-100%)} 100%{transform:translateX(100%) translateY(100%)} }
.brand h1 { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:#fff; letter-spacing:1px; }
.brand p  { font-size:11px; color:#fafafa; margin-top:-2px; }
.header-stats { display:flex; gap:20px; }
.hstat { text-align:center; }
.hstat-val { font-size:17px; font-weight:700; color:var(--accent); font-family:'JetBrains Mono',monospace; }
.hstat-lbl { font-size:10px; color:#fafafa; }
.location-pill {
  display:flex; align-items:center; gap:8px;
  background: rgba(0,229,176,0.08);
  border: 1px solid rgba(0,229,176,0.2);
  border-radius:20px;
  padding: 6px 14px;
  font-size:12px; color:var(--accent);
}
.pulse-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,229,176,.5)} 50%{box-shadow:0 0 0 6px rgba(0,229,176,0)} }

/* ─── MAIN LAYOUT ─── */
.main { display:flex; flex:1; overflow:hidden; position:relative; z-index:1; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 360px; min-width:360px;
  background: rgba(7,13,26,0.88);
  border-left: 1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  backdrop-filter: blur(12px);
}
.sidebar-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
.tab-btn {
  flex:1; padding:12px 4px;
  background:none; border:none;
  color:#fafafa; font-family:'Cairo',sans-serif; font-size:11px;
  cursor:pointer; transition:all .2s;
  border-bottom:2px solid transparent; margin-bottom:-1px;
}
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(0,229,176,.05); }
.tab-content { display:none; flex-direction:column; overflow:hidden; flex:1; }
.tab-content.active { display:flex; }

/* ─── SAMPLE LIST ─── */
.sample-list { overflow-y:auto; flex:1; padding:8px; }
.sample-list::-webkit-scrollbar { width:3px; }
.sample-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.sample-item {
  padding:10px 12px; border-radius:10px; cursor:pointer;
  display:flex; align-items:center; gap:10px; margin-bottom:4px;
  border:1px solid transparent; transition:all .2s;
  background: rgba(12,20,37,0.6);
}
.sample-item:hover { background:rgba(0,229,176,.06); border-:rgba(0,229,176,.2); transform:translateX(-2px); }
.sample-item.selected { background:rgba(0,229,176,.1); border-color:var(--accent); }
.sample-num {
  width:30px; height:30px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:#000; flex-shrink:0;
}
.sample-info { flex:1; min-width:0; }
.sample-info h4 { font-size:13px; font-weight:600; }
.sample-info p  { font-size:11px; color:var(--muted); margin-top:1px; }
.sample-badge { font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 7px; border-radius:4px; font-weight:600; }

/* ─── DETAIL PANEL ─── */
.detail-panel { overflow-y:auto; flex:1; padding:12px; }
.detail-panel::-webkit-scrollbar { width:3px; }
.detail-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.detail-header {
  background: linear-gradient(135deg, rgba(0,229,176,.1), rgba(79,142,255,.1));
  border:1px solid var(--border); border-radius:12px;
  padding:14px; margin-bottom:12px;
  position:relative; overflow:hidden;
}
.detail-header::before {
  content:''; position:absolute; top:0; right:0;
  width:100px; height:100px;
  background: radial-gradient(circle, rgba(0,229,176,.1), transparent);
  border-radius:50%;
}
.detail-header h2 { font-size:16px; font-weight:700; color:var(--accent); font-family:'Syne',sans-serif; }
.detail-header p  { font-size:11px; color:var(--muted); margin-top:3px; font-family:'JetBrains Mono',monospace; }

.section-title {
  font-size:11px; font-weight:700; color:#fafafa;
  text-transform:uppercase; letter-spacing:1px;
  margin:12px 0 6px; display:flex; align-items:center; gap:6px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.params-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.param-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:10px 12px;
  position:relative; overflow:hidden; transition:all .2s;
}
.param-card:hover { border-color:rgba(0,229,176,.3); }
.param-card::before { content:''; position:absolute; top:0; right:0; width:3px; height:100%; border-radius:0 10px 10px 0; }
.param-card.good::before  { background:var(--green); }
.param-card.warn::before  { background:var(--warn); }
.param-card.bad::before   { background:var(--danger); }
.param-card.neutral::before { background:var(--accent2); }
.param-label { font-size:10px; color:var(--muted); margin-bottom:2px; }
.param-value { font-size:16px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.param-unit  { font-size:10px; color:var(--muted); margin-top:1px; }
.param-bar-wrap { margin-top:5px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.param-bar { height:100%; border-radius:2px; transition:width .8s cubic-bezier(.4,0,.2,1); }

.ions-table { width:100%; border-collapse:collapse; font-size:12px; }
.ions-table th { background:rgba(255,255,255,.03); padding:6px 8px; text-align:right; font-weight:600; color:var(--muted); font-size:11px; }
.ions-table td { padding:6px 8px; border-top:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:12px; }
.ions-table tr:hover td { background:rgba(255,255,255,.02); }

.status-badge { padding:1px 7px; border-radius:4px; font-size:10px; font-weight:700; font-family:'Cairo',sans-serif; }
.status-good    { background:rgba(34,197,94,.15);  color:var(--green); }
.status-warn    { background:rgba(245,166,35,.15); color:var(--warn); }
.status-bad     { background:rgba(255,61,87,.15);  color:var(--danger); }
.status-neutral { background:rgba(79,142,255,.15); color:var(--accent2); }

/* ─── CROP SUITABILITY TABLE ─── */
.crop-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.crop-card {
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:8px 10px; display:flex; align-items:center; gap:8px; transition:all .2s;
}
.crop-card:hover { border-color:rgba(0,229,176,.25); transform:scale(1.01); }
.crop-icon { font-size:18px; }
.crop-info { flex:1; min-width:0; }
.crop-name { font-size:11px; font-weight:700; }
.crop-class { font-size:10px; font-family:'JetBrains Mono',monospace; margin-top:1px; }
.crop-s1 { color:var(--green); }
.crop-s2 { color:var(--accent); }
.crop-s3 { color:var(--warn); }
.crop-s4 { color:var(--danger); }
.crop-ns { color:var(--muted); }

/* ─── LU/LC TABLE ─── */
.lu-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:8px; }
.lu-table th { background:rgba(0,229,176,.08); padding:7px 10px; text-align:right; font-size:11px; color:var(--accent); border-bottom:1px solid var(--border); }
.lu-table td { padding:7px 10px; border-top:1px solid rgba(255,255,255,.04); font-family:'JetBrains Mono',monospace; font-size:11px; }
.lu-bar-cell { min-width:80px; }
.lu-mini-bar { height:6px; border-radius:3px; background:var(--accent); transition:width .8s; }
.lu-veg  .lu-mini-bar { background:var(--green); }
.lu-soil .lu-mini-bar { background:var(--warn); }

.placeholder-msg { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:10px; padding:40px 20px; text-align:center; }
.placeholder-msg .big-icon { font-size:48px; opacity:.4; }
.placeholder-msg p { font-size:13px; line-height:1.6; }

/* ─── MAP ─── */
#map { flex:1; position:relative; z-index:1; }
.map-wrap { position:relative; flex:1; display:flex; }

/* ─── CONTROLS ─── */
.layer-control {
  position:absolute; top:14px; right:14px; z-index:800;
  background:rgba(4,8,15,.92); border:1px solid var(--border);
  border-radius:12px; padding:12px 16px; backdrop-filter:blur(16px); min-width:170px;
}
.layer-title { font-size:11px; font-weight:700; color:#fafafa; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.layer-opt { display:flex; align-items:center; gap:8px; padding:5px 0; cursor:pointer; font-size:12px; }
.layer-opt input[type=radio] { accent-color:var(--accent); cursor:pointer; }

.legend-bar {
  position:absolute; bottom:36px; right:14px; z-index:800;
  background:rgba(4,8,15,.92); border:1px solid var(--border);
  border-radius:12px; padding:12px 16px; backdrop-filter:blur(16px); min-width:160px;
}
.legend-title { font-size:10px; color:#fafafa; margin-bottom:6px; font-weight:700; text-transform:uppercase; }
.legend-item { display:flex; align-items:center; gap:7px; font-size:11px; margin-bottom:4px; }
.legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

/* ─── 3D VIEW PANEL ─── */
.view3d-btn {
  position:absolute; top:14px; left:14px; z-index:800;
  background:rgba(0,229,176,.1); border:1px solid rgba(0,229,176,.3);
  border-radius:8px; padding:8px 14px; color:var(--accent);
  font-family:'Cairo',sans-serif; font-size:12px; font-weight:700;
  cursor:pointer; transition:all .2s; backdrop-filter:blur(8px);
  display:flex; align-items:center; gap:6px;
}
.view3d-btn:hover { background:rgba(0,229,176,.2); box-shadow:0 0 20px rgba(0,229,176,.2); }

/* ─── LEAFLET TOOLTIP ─── */
.leaflet-tooltip {
  background:rgba(4,8,15,.96) !important; border:1px solid var(--border) !important;
  color:var(--text) !important; font-family:'Cairo',sans-serif !important;
  font-size:12px !important; border-radius:10px !important;
  padding:10px 14px !important; box-shadow:0 8px 32px rgba(0,0,0,.6) !important;
}
.leaflet-tooltip::before { display:none !important; }
.tt-title { font-weight:700; color:var(--accent); font-size:13px; margin-bottom:5px; font-family:'Syne',sans-serif; }
.tt-row   { display:flex; justify-content:space-between; gap:16px; font-size:11px; color:var(--muted); }
.tt-val   { color:var(--text); font-weight:600; font-family:'JetBrains Mono',monospace; }

/* ─── ADD FORM ─── */
.add-form { padding:12px; overflow-y:auto; flex:1; }
.add-form::-webkit-scrollbar { width:3px; }
.add-form::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.form-group { margin-bottom:10px; }
.form-group label { display:block; font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; }
.form-group input, .form-group select {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:8px 10px; color:var(--text);
  font-family:'Cairo',sans-serif; font-size:13px; outline:none; transition:border-color .2s;
}
.form-group input:focus, .form-group select:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,229,176,.1); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.btn-add {
  width:100%; padding:11px; background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; border-radius:10px; color:#00000079; font-family:'Cairo',sans-serif;
  font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; margin-top:6px;
}
.btn-add:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,229,176,.3); }
.form-msg { font-size:12px; text-align:center; margin-top:8px; min-height:18px; }
.add-form .section-title { margin-top:14px; }

/* ─── STATS TAB ─── */
.stats-panel { overflow-y:auto; flex:1; padding:12px; }
.stats-panel::-webkit-scrollbar { width:3px; }
.stats-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.big-stat-card {
  background: linear-gradient(135deg, rgba(0, 229, 176, 0.137), rgba(79, 141, 255, 0.121));
  border:1px solid var(--border); border-radius:12px;
  padding:14px; margin-bottom:10px; text-align:center;
}
.big-stat-val { font-size:32px; font-weight:800; font-family:'Syne',sans-serif; color:var(--accent); }
.big-stat-lbl { font-size:12px; color:var(--muted); margin-top:2px; }
.progress-item { margin-bottom:10px; }
.progress-label { display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px; }
.progress-label span:first-child { color:var(--text); }
.progress-label span:last-child { color:var(--accent); font-family:'JetBrains Mono',monospace; }
.progress-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width 1s cubic-bezier(.4,0,.2,1); }
</style>
</head>
<body>

<!-- 3D BACKGROUND CANVAS -->
<canvas id="three-canvas"></canvas>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🌍</div>
    <div class="brand">
      <h1>SoilSense<span style="color:var(--accent)">3D</span></h1>
      <p>Agricultural Soil Intelligence Platform</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val" id="h-total">18</div><div class="hstat-lbl">عينات</div></div>
    <div class="hstat"><div class="hstat-val" id="h-ec">—</div><div class="hstat-lbl">متوسط EC</div></div>
    <div class="hstat"><div class="hstat-val" id="h-ph">—</div><div class="hstat-lbl">متوسط pH</div></div>
    <div class="hstat"><div class="hstat-val" id="h-area">971.6</div><div class="hstat-lbl">فدان كُلي</div></div>
  </div>
  <div class="location-pill">
    <div class="pulse-dot"></div>
    📍 زهور الأمراء · الدلنجات · البحيرة
  </div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('list')">🗂️ العينات</button>
      <button class="tab-btn" onclick="switchTab('detail')">🔬 التفاصيل</button>
      <button class="tab-btn" onclick="switchTab('stats')">📊 الإحصاء</button>
      <button class="tab-btn" onclick="switchTab('add')">➕ إضافة</button>
    </div>

    <!-- LIST TAB -->
    <div class="tab-content active" id="tab-list">
      <div class="sample-list" id="sample-list"></div>
    </div>

    <!-- DETAIL TAB -->
    <div class="tab-content" id="tab-detail">
      <div id="detail-placeholder" class="placeholder-msg">
        <div class="big-icon">🔬</div>
        <p>اضغط على أي نقطة في الخريطة<br>أو على عينة من القائمة</p>
      </div>
      <div id="detail-panel" class="detail-panel" style="display:none"></div>
    </div>

    <!-- STATS TAB -->
    <div class="tab-content" id="tab-stats">
      <div class="stats-panel" id="stats-panel"></div>
    </div>

    <!-- ADD TAB -->
    <div class="tab-content" id="tab-add">
      <div class="add-form" id="add-form">
        <div class="section-title">📍 الإحداثيات</div>
        <div class="form-row">
          <div class="form-group"><label>خط العرض N</label><input type="number" id="f-lat" step="0.0001" placeholder="30.7540"></div>
          <div class="form-group"><label>خط الطول E</label><input type="number" id="f-lon" step="0.0001" placeholder="30.5460"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>العمق (cm)</label><input type="number" id="f-depth" step="1" placeholder="100"></div>
          <div class="form-group"><label>الارتفاع (m)</label><input type="number" id="f-elev" step="0.1" placeholder="6.0"></div>
        </div>
        <div class="section-title">⚗️ الخواص الكيميائية</div>
        <div class="form-row">
          <div class="form-group"><label>pH</label><input type="number" id="f-ph" step="0.1" placeholder="8.0"></div>
          <div class="form-group"><label>EC (ds/m)</label><input type="number" id="f-ec" step="0.01" placeholder="0.5"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>CaCO3 %</label><input type="number" id="f-caco3" step="0.01" placeholder="4.0"></div>
          <div class="form-group"><label>O.M %</label><input type="number" id="f-om" step="0.001" placeholder="1.0"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>N (ppm)</label><input type="number" id="f-tan" step="0.1" placeholder="100"></div>
          <div class="form-group"><label>P (ppm)</label><input type="number" id="f-tap" step="0.1" placeholder="20"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>K (mg/kg)</label><input type="number" id="f-k" step="1" placeholder="1000"></div>
          <div class="form-group"><label>SAR</label><input type="number" id="f-sar" step="0.01" placeholder="2.0"></div>
        </div>
        <div class="form-group">
          <label>نوع التربة</label>
          <select id="f-texture">
            <option value="sand">رملية (sand)</option>
            <option value="loamy sand">رملية طينية (loamy sand)</option>
            <option value="sandy loam">طينية رملية (sandy loam)</option>
            <option value="loam">طمي (loam)</option>
            <option value="clay loam">طيني طمي (clay loam)</option>
          </select>
        </div>
        <button class="btn-add" onclick="addNewSample()">➕ إضافة النقطة</button>
        <div class="form-msg" id="form-msg"></div>
      </div>
    </div>
  </div>

  <!-- MAP WRAPPER -->
  <div class="map-wrap">
    <div id="map"></div>

    <!-- Layer Control -->
    <div class="layer-control">
      <div class="layer-title">🎨 طبقة التصوير</div>
      <label class="layer-opt"><input type="radio" name="layer" value="ec" checked> الملوحة EC</label>
      <label class="layer-opt"><input type="radio" name="layer" value="ph"> الحموضة pH</label>
      <label class="layer-opt"><input type="radio" name="layer" value="om"> المادة العضوية</label>
      <label class="layer-opt"><input type="radio" name="layer" value="caco3"> كربونات الكالسيوم</label>
      <label class="layer-opt"><input type="radio" name="layer" value="sar"> نسبة الصوديوم SAR</label>
      <label class="layer-opt"><input type="radio" name="layer" value="tan"> نيتروجين N</label>

<script>
// ════════════════════════════════════════════════════
//  THREE.JS 3D BACKGROUND
// ════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 30, 60);
  camera.lookAt(0, 0, 0);

  // Ground terrain mesh (simulating soil elevation map)
  const geo = new THREE.PlaneGeometry(120, 80, 60, 40);
  const positions = geo.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    const x = positions.getX(i);
    const y = positions.getY(i);
    const z = Math.sin(x * 0.08) * Math.cos(y * 0.12) * 3.5
            + Math.sin(x * 0.2 + 1) * Math.cos(y * 0.15) * 1.5
            + (Math.random() - 0.5) * 0.8;
    positions.setZ(i, z);
  }
  geo.computeVertexNormals();

  // Wireframe overlay
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x00e5b0, wireframe: true, opacity: 0.18, transparent: true
  });
  const wireMesh = new THREE.Mesh(geo, wireMat);
  wireMesh.rotation.x = -Math.PI / 2.4;
  wireMesh.position.y = -12;
  scene.add(wireMesh);

  // Solid fill
  const solidMat = new THREE.MeshLambertMaterial({
    color: 0x071830, opacity: 0.6, transparent: true, side: THREE.DoubleSide
  });
  const solidMesh = new THREE.Mesh(geo.clone(), solidMat);
  solidMesh.rotation.x = -Math.PI / 2.4;
  solidMesh.position.y = -12;
  scene.add(solidMesh);

  // Sample points as 3D spheres
  const samplePositions = [
    [-8, 2, -6], [-4, 3, -2], [0, 2.5, 0], [4, 3, -4],
    [8, 1.5, 2], [-6, 2, 4], [2, 3.5, 6], [6, 2, 4],
    [-2, 2.8, -8], [10, 2, -2], [-10, 1.5, 0], [8, 3, -8],
    [12, 2.5, 4], [-4, 2, 8], [14, 1.8, 0], [16, 2.2, -4],
    [0, 3, 10], [-8, 2.5, -4]
  ];

  const dotColors = [0x22c55e, 0x00e5b0, 0xf5a623, 0xff3d57, 0x4f8eff];
  samplePositions.forEach((pos, i) => {
    const r = 0.4 + Math.random() * 0.3;
    const sg = new THREE.SphereGeometry(r, 8, 8);
    const sm = new THREE.MeshBasicMaterial({
      color: dotColors[i % dotColors.length],
      opacity: 0.8 + Math.random() * 0.2, transparent: true
    });
    const sphere = new THREE.Mesh(sg, sm);
    sphere.position.set(pos[0], pos[1] - 10, pos[2]);
    scene.add(sphere);

    // Glow ring
    const rg = new THREE.RingGeometry(r + 0.3, r + 0.7, 16);
    const rm = new THREE.MeshBasicMaterial({
      color: dotColors[i % dotColors.length], side: THREE.DoubleSide,
      opacity: 0.3, transparent: true
    });
    const ring = new THREE.Mesh(rg, rm);
    ring.rotation.x = -Math.PI / 2.4;
    ring.position.set(pos[0], pos[1] - 10.5, pos[2]);
    scene.add(ring);
  });

  // Vertical scan lines
  for (let i = 0; i < 5; i++) {
    const lg = new THREE.BufferGeometry();
    const x = -20 + i * 10;
    const pts = [];
    for (let z = -40; z <= 40; z += 2) {
      pts.push(x, -5, z);
    }
    lg.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    const lm = new THREE.LineBasicMaterial({ color: 0x4f8eff, opacity: 0.12, transparent: true });
    scene.add(new THREE.Line(lg, lm));
  }

  // Lighting
  scene.add(new THREE.AmbientLight(0x0d2040, 2));
  const dLight = new THREE.DirectionalLight(0x00e5b0, 1);
  dLight.position.set(10, 20, 10);
  scene.add(dLight);
  const pLight = new THREE.PointLight(0x4f8eff, 1.5, 80);
  pLight.position.set(-20, 10, 0);
  scene.add(pLight);

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.003;
    wireMesh.rotation.z = Math.sin(t * 0.5) * 0.02;
    solidMesh.rotation.z = wireMesh.rotation.z;
    camera.position.x = Math.sin(t * 0.3) * 8;
    camera.position.z = 60 + Math.sin(t * 0.2) * 5;
    camera.lookAt(0, -5, 0);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

// Map type switcher state
let currentBase = 'satellite';
function switchBaseMap(type) {
  map.removeLayer(satelliteLayer);
  map.removeLayer(topoLayer);
  map.removeLayer(osmLayer);
  map.removeLayer(labelsLayer);
  currentBase = type;
  if (type==='satellite') { satelliteLayer.addTo(map); labelsLayer.addTo(map); }
  else if (type==='topo') { topoLayer.addTo(map); }
  else { osmLayer.addTo(map); }
  document.querySelectorAll('.maptype-btn').forEach(b => b.classList.toggle('active', b.dataset.type===type));
}

L.control.zoom({ position:'bottomright' }).addTo(map);

let markers = [];
let currentLayer = 'ec';
let selectedId = null;

function getColor(s, lk) {
  const cfg = LAYERS[lk]; const v = s[cfg.key];
  if (v == null) return '#4a6080';
  const r = cfg.ranges;
  if (v <= r[0]) return cfg.colors[0];
  if (v <= r[1]) return cfg.colors[1];
  if (v <= r[2]) return cfg.colors[2];
  return cfg.colors[3];
}

function makeIcon(s, lk) {
  const color = getColor(s, lk);
  const sel = s.id === selectedId;
  const size = sel ? 24 : 18;
  const ring = sel ? `<circle cx="12" cy="12" r="11" fill="none" stroke="${color}" stroke-width="2.5" opacity="0.6"/>` : '';
  const glow = sel ? `<circle cx="12" cy="12" r="8" fill="${color}" opacity="0.15"/>` : '';
  const svg = `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    ${ring}${glow}
    <circle cx="12" cy="12" r="${size/3}" fill="${color}" stroke="#04080f" stroke-width="2"/>
    <text x="12" y="16" text-anchor="middle" fill="#000" font-size="9" font-weight="bold" font-family="monospace">${s.id}</text>
  </svg>`;
  return L.divIcon({ html:svg, className:'', iconSize:[24,24], iconAnchor:[12,12] });
}

function buildTooltip(s) {
  const cfg = LAYERS[currentLayer]; const v = s[cfg.key];
  return `<div class="tt-title">عينة #${s.id} — ${s.texture}</div>
  <div class="tt-row"><span>${cfg.label}</span><span class="tt-val">${v!=null?v:'—'}</span></div>
  <div class="tt-row"><span>EC / pH</span><span class="tt-val">${s.EC} / ${s.pH}</span></div>
  <div class="tt-row"><span>المساحة</span><span class="tt-val">${s.area_fed} fed (${s.area_pct}%)</span></div>`;
}

function drawMarkers() {
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];
  SAMPLES.forEach(s => {
    const m = L.marker([s.lat, s.lon], { icon:makeIcon(s, currentLayer) })
      .addTo(map)
      .bindTooltip(buildTooltip(s), { direction:'top', offset:[0,-8] })
      .on('click', () => selectSample(s.id));
    markers.push({ id:s.id, marker:m });
  });
}

function refreshMarkers() {
  markers.forEach(({id,marker}) => {
    const s = SAMPLES.find(x => x.id===id);
    if (s) { marker.setIcon(makeIcon(s, currentLayer)); marker.setTooltipContent(buildTooltip(s)); }
  });
}

function updateLegend() {
  const cfg = LAYERS[currentLayer];
  document.getElementById('legend-bar').innerHTML =
    `<div class="legend-title">${cfg.label}</div>` +
    cfg.legendLabels.map((lbl,i) =>
      `<div class="legend-item"><div class="legend-dot" style="background:${cfg.colors[i]}"></div>${lbl}</div>`
    ).join('');
}

function selectSample(id) {
  selectedId = id;
  refreshMarkers();
  const s = SAMPLES.find(x => x.id===id);
  renderDetail(s);
  switchTab('detail');
  document.querySelectorAll('.sample-item').forEach(el => {
    el.classList.toggle('selected', +el.dataset.id===id);
  });
  map.panTo([s.lat, s.lon]);
}

function pct(v, max) { return Math.min(100, Math.round((v/max)*100)); }
function paramCard(label, value, unit, cls, maxVal) {
  const bw = maxVal && value!=null ? pct(value,maxVal) : 0;
  const bc = cls==='good'?'#22c55e':cls==='warn'?'#f5a623':cls==='bad'?'#ff3d57':'#4f8eff';
  return `<div class="param-card ${cls}">
    <div class="param-label">${label}</div>
    <div class="param-value">${value!=null?value:'—'}</div>
    <div class="param-unit">${unit}</div>
    ${maxVal?`<div class="param-bar-wrap"><div class="param-bar" style="width:${bw}%;background:${bc}"></div></div>`:''}
  </div>`;
}

function cropClass(code) {
  if (!code) return 'crop-ns';
  if (code.startsWith('S1')) return 'crop-s1';
  if (code.startsWith('S2')) return 'crop-s2';
  if (code.startsWith('S3')) return 'crop-s3';
  if (code.startsWith('S4')) return 'crop-s4';
  return 'crop-ns';
}

  <div class="section-title">📈 توزيع المساحة الإنتاجية بالفدان</div>
  <table class="lu-table">
    <tr><th>المحصول</th><th style="color:var(--green)">S1 ممتاز</th><th style="color:var(--accent)">S2 جيد</th><th style="color:var(--warn)">S3 متوسط</th></tr>
    ${cropRows}
  </table>

  <div class="section-title">🔬 توزيع خصائص التربة (فدان)</div>
  ${props.map(p => `
  <div style="margin-bottom:10px">
    <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:6px">${p.label}</div>
    ${p.vals.map((v,i) => `
    <div class="progress-item">
      <div class="progress-label"><span>فئة ${i+1}</span><span>${v.toFixed(1)} fed (${p.pcts[i].toFixed(1)}%)</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${p.pcts[i]}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div>
    </div>`).join('')}
  </div>`).join('')}`;
}

// ════════════════════════════════════════════════════
//  SAMPLE LIST
// ════════════════════════════════════════════════════
function buildList() {
  const el = document.getElementById('sample-list');
  el.innerHTML = SAMPLES.map(s => {
    const color = getColor(s, currentLayer);
    const cfg = LAYERS[currentLayer];
    const v = s[cfg.key];
    return `<div class="sample-item" data-id="${s.id}" onclick="selectSample(${s.id})">
      <div class="sample-num" style="background:${color}">${s.id}</div>
      <div class="sample-info">
        <h4>عينة #${s.id} — ${s.texture}</h4>
        <p>pH: ${s.pH} | EC: ${s.EC} | OM: ${s.OM}%</p>
      </div>
      <div class="sample-badge" style="background:${color}22;color:${color}">${v!=null?v:'—'}</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  HEADER STATS
// ════════════════════════════════════════════════════
function updateStats() {
  const avg = k => (SAMPLES.reduce((s,x)=>s+(x[k]||0),0)/SAMPLES.length).toFixed(2);
  document.getElementById('h-total').textContent = SAMPLES.length;
  document.getElementById('h-ec').textContent = avg('EC');
  document.getElementById('h-ph').textContent = avg('pH');
}

// ════════════════════════════════════════════════════
//  ADD SAMPLE
// ════════════════════════════════════════════════════
function addNewSample() {
  const g = id => parseFloat(document.getElementById(id).value);
  const gs = id => document.getElementById(id).value;
  const lat = g('f-lat'), lon = g('f-lon');
  if (!lat || !lon) { showFormMsg('❌ خط العرض وخط الطول مطلوبان','var(--danger)'); return; }
  const newId = Math.max(...SAMPLES.map(s=>s.id))+1;
  const sample = {
    id:newId, lat, lon,
    depth:g('f-depth')||null, elev:g('f-elev')||null,
    pH:g('f-ph')||null, EC:g('f-ec')||null,
    CaCO3:g('f-caco3')||null, OM:g('f-om')||null,
    TAN:g('f-tan')||null, TAP:g('f-tap')||null,
    K_mg:g('f-k')||null, SAR:g('f-sar')||null,
    texture:gs('f-texture'),
    Na:null,K_meq:null,Ca:null,Mg:null,Cl:null,HCO3:null,SO4:null,
    silt:null,clay:null,sand:null,
    area_fed:0, area_pct:0,
  };
  SAMPLES.push(sample);
  const m = L.marker([lat,lon], {icon:makeIcon(sample,currentLayer)})
    .addTo(map)
    .bindTooltip(buildTooltip(sample), {direction:'top',offset:[0,-8]})
    .on('click', ()=>selectSample(sample.id));
  markers.push({id:sample.id, marker:m});
  buildList(); updateStats();
  showFormMsg('✅ تمت إضافة النقطة!','var(--accent)');
  document.querySelectorAll('#add-form input').forEach(i=>i.value='');
  setTimeout(()=>selectSample(newId),500);
}

function showFormMsg(msg, color) {
  const el = document.getElementById('form-msg');
  el.textContent=msg; el.style.color=color;
  setTimeout(()=>el.textContent='',3000);
}

// ════════════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════════════
function switchTab(name) {
  const tabs = ['list','detail','stats','add'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// Layer switch
document.querySelectorAll('input[name="layer"]').forEach(r => {
  r.addEventListener('change',()=>{
    currentLayer=r.value; refreshMarkers(); updateLegend(); buildList();
  });
});

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
drawMarkers();
updateLegend();
buildList();
updateStats();
buildStats();
</script>
</body>
</html>
